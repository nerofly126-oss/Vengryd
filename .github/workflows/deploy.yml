name: Deploy (Vercel)

# Production deploy via the Vercel CLI.
# OPT-IN: this job only runs when the repo variable ENABLE_VERCEL_DEPLOY == 'true'.
# If your repo is already connected to Vercel's Git integration (auto-deploy),
# you do NOT need this — leave the variable unset and Vercel deploys on push.
#
# To enable Actions-driven deploys instead:
#   1. Repo → Settings → Secrets and variables → Actions
#      Secrets:   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#      Variables: ENABLE_VERCEL_DEPLOY = true
#   2. Set the app env vars (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY) in the
#      Vercel project (Production) — `vercel pull` brings them into the build.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
